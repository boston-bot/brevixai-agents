name: Benchmark Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  benchmark:
    name: Benchmark & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest --ignore=tests/test_evals.py -q

      - name: Validate benchmark dataset
        run: python scripts/validate_benchmark_dataset.py

      - name: Run benchmarks and generate report
        run: python scripts/run_benchmarks.py --report

      - name: Quality gate
        run: python scripts/quality_gate.py --report-json reports/latest_benchmark_report.json

      - name: Generate benchmark snapshot
        if: always()
        run: python scripts/generate_benchmark_snapshot.py

      - name: Generate coverage matrix
        if: always()
        run: python scripts/generate_coverage_matrix.py

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: ignore
